# GitHub Action: Video Processing Workflow
# Triggered by webhook after video upload
# Generates thumbnail, teaser, and multi-bitrate HLS files

name: Process Video

on:
  repository_dispatch:
    types: [process_video]
  workflow_dispatch: # Allow manual trigger

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout processor script
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install dependencies
        run: |
          npm install @aws-sdk/client-s3

      - name: Run video processor
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          APP_URL: ${{ secrets.APP_URL }}
          PROCESSOR_API_KEY: ${{ secrets.PROCESSOR_API_KEY }}
        run: |
          node scripts/process-videos.js

      - name: Report status
        if: always()
        run: |
          echo "Processing completed with status: ${{ job.status }}"
